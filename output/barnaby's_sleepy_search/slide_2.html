<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{

margin:0;
padding:0;

width:1080px;
height:1920px;

background: #F0F8FF;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,sans-serif;

}

.card{

width:900px;

padding:80px;

background:white;

border-radius:40px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

}

.title{

font-size:72px;

font-weight:bold;

margin-bottom:60px;

color:#333;

}

.story{

font-size:46px;

line-height:1.6;

color:#555;

}

.page{

margin-top:70px;

font-size:34px;

color:#999;

text-align:right;

}

</style>

</head>

<body>

<div class="card">

<div class="title">
Barnaby's Sleepy Search
</div>

<div class="story">
Barnaby started his search. He gently nudged through his toy basket, where soft teddy bears and smooth wooden blocks slept soundly. He peered under a shiny red car and a cuddly brown bear. 'Not here,' he whispered, feeling a tiny bit puzzled, but still very sleepy.
</div>

<div class="page">
Page 2
</div>

</div>

</body>

</html>
