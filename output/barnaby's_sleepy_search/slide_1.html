Barnaby's Sleepy Search
</div>

Little Barnaby the bunny felt a big yawn stretch across his face. 'It's bedtime,' he mumbled, his long, floppy ears drooping. He hopped towards his cozy bed, ready to snuggle down with his favorite, fluffy cloud pillow. But where was it? His special pillow was gone!
