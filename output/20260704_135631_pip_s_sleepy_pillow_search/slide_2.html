<!DOCTYPE html>

<head>

<meta charset="UTF-8">

<style>

body{

margin:0;
padding:0;

width:1080px;
height:1920px;

background: #E0F7FA;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,sans-serif;

}

.card{

width:900px;

padding:80px;

background:white;

border-radius:40px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

}

.title{

font-weight:bold;

margin-bottom:60px;

color:#333;

}

.story{

font-size:46px;

line-height:1.6;

color:#555;

}

.page{

margin-top:70px;

font-size:34px;

color:#999;

text-align:right;

}

</style>

</head>

<body>

<div class="card">

<div class="title">
Pip's Sleepy Pillow Search
</div>

<div class="story">
Pip hopped quietly around his cozy burrow. 'Maybe it's here?' he wondered, peeking under a giant, sleepy daisy. The petals were soft, but it wasn't his special pillow. He twitched his nose, determined to find his favorite fluffy friend before falling asleep.
</div>

<div class="page">

</div>
