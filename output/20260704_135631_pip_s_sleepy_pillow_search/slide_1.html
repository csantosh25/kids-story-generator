}

.card{

padding:80px;

border-radius:40px;

}

.story{

font-size:46px;

line-height:1.6;

color:#555;

}

.page{

margin-top:70px;

font-size:34px;

color:#999;

text-align:right;

}

</style>

</head>

<body>

<div class="card">

<div class="title">
Pip's Sleepy Pillow Search
</div>

<div class="story">
Little Pip the bunny felt a big yawn coming. His fluffy ears drooped low, and his bright blue eyes grew heavy. It was time for bed, but oh dear, where was his favourite soft, cloud-like pillow? He loved to snuggle with it every night.

<div class="page">
