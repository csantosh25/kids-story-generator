{% extends "layout.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h3 class="mb-0">
            🎉 Story Generated Successfully
        </h3>

    </div>

    <div class="card-body">

        <h2>{{ result.story.story_info.title }}</h2>

        <hr>

        <h5>📂 Output Folder</h5>

        <p>{{ result.output_folder }}</p>

        <hr>

        <h5>🖼 Cover</h5>

        <img
            src="/output/{{ result.output_folder.name }}/cover_final.png"
            class="img-fluid rounded border">

        <hr>

        <a
            href="/"
            class="btn btn-primary">

            Generate Another Story

        </a>

    </div>

</div>

{% endblock %}
