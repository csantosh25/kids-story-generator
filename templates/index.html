{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">
                    📚 Generate a Kids Story
                </h3>

            </div>

            <div class="card-body">

                <form action="/generate" method="post">

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Story Theme
                        </label>

                        <div class="form-check">

                            <input
                                class="form-check-input"
                                type="radio"
                                name="theme_mode"
                                value="random"
                                checked
                                onclick="toggleTheme()">

                            <label class="form-check-label">
                                🎲 Random Theme
                            </label>

                        </div>

                        <div class="form-check">

                            <input
                                class="form-check-input"
                                type="radio"
                                name="theme_mode"
                                value="manual"
                                onclick="toggleTheme()">

                            <label class="form-check-label">
                                ✍️ Select Theme
                            </label>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Choose Theme
                        </label>

                        <select
                            id="themeSelect"
                            class="form-select"
                            name="theme"
                            disabled>

                            {% for theme in themes %}

                            <option value="{{ theme }}">
                                {{ theme }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg w-100">

                        🚀 Generate Story

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
